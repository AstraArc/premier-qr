  :root {
    --bg: #0a0a0f;
    --surface: #141419;
    --surface-2: #1c1c24;
    --border: #2a2a35;
    --text: #e8e6e1;
    --text-dim: #8a8890;
    --accent: #c9a96e;
    --accent-soft: rgba(201, 169, 110, 0.12);
    --accent-glow: rgba(201, 169, 110, 0.06);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ---- IMAGE GALLERY ---- */
  .gallery {
    position: relative;
    width: 100%;
    aspect-ratio: 1;
    background: var(--surface);
    overflow: hidden;
  }
  .gallery-track {
    display: flex;
    width: 100%;
    height: 100%;
    transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .gallery-slide {
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  .gallery-slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .placeholder-img {
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, var(--surface) 0%, var(--surface-2) 100%);
    gap: 12px;
  }
  .placeholder-img svg {
    width: 48px;
    height: 48px;
    color: var(--border);
  }
  .placeholder-img span {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .gallery-dots {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 2;
  }
  .gallery-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(255,255,255,0.3);
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    padding: 0;
  }
  .gallery-dot.active {
    background: var(--accent);
    width: 20px;
    border-radius: 3px;
  }
  .gallery-counter {
    position: absolute;
    top: 16px;
    right: 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
  }
  .back-btn {
    position: absolute;
    top: 16px;
    left: 16px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    border: none;
    color: white;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    z-index: 10;
    text-decoration: none;
  }
  .back-btn svg { width: 18px; height: 18px; }

  /* ---- CONTENT ---- */
  .content {
    padding: 28px 24px 40px;
    max-width: 500px;
    margin: 0 auto;
  }
  .category-badge {
    display: inline-block;
    font-size: 10px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 10px;
    font-weight: 500;
    background: var(--accent-soft);
    padding: 5px 12px;
    border-radius: 4px;
  }
  .product-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: 30px;
    font-weight: 300;
    letter-spacing: -0.5px;
    line-height: 1.2;
    margin-bottom: 4px;
  }
  .product-model {
    font-size: 12px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    margin-bottom: 20px;
    font-family: monospace;
  }
  .tag-row {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 24px;
  }
  .tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 4px;
    background: var(--surface-2);
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .tag.highlight {
    background: var(--accent-soft);
    color: var(--accent);
    border-color: transparent;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 0 0 24px;
  }
  .description {
    font-size: 14.5px;
    line-height: 1.7;
    color: var(--text-dim);
    margin-bottom: 28px;
    font-weight: 300;
  }

  /* ---- SPECS ---- */
  .specs-title {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 16px;
    font-weight: 500;
  }
  .specs-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .spec-item {
    background: var(--surface);
    padding: 14px 16px;
  }
  .spec-label {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 5px;
    font-weight: 500;
  }
  .spec-value {
    font-size: 14px;
    color: var(--text);
    font-weight: 400;
  }

  /* ---- INCLUDES BOX (for kits) ---- */
  .includes-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 18px 20px;
    margin-bottom: 28px;
  }
  .includes-box h3 {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 14px;
    font-weight: 500;
  }
  .includes-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13.5px;
    color: var(--text);
    line-height: 1.5;
  }
  .includes-item:last-child { border-bottom: none; }
  .includes-check {
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 2px;
  }

  /* ---- NOTES ---- */
  .note-box {
    background: var(--accent-soft);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 28px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }
  .note-box svg {
    width: 16px;
    height: 16px;
    color: var(--accent);
    flex-shrink: 0;
    margin-top: 1px;
  }
  .note-box p {
    font-size: 13px;
    color: var(--accent);
    line-height: 1.5;
  }

  /* ---- CTA ---- */

    padding: 16px;

    color: var(--bg);
    border: none;
    border-radius: 8px;

    font-size: 14px;
    font-weight: 500;
    letter-spacing: 1px;

    cursor: pointer;
    text-align: center;
    text-decoration: none;

  .btn-secondary {

    padding: 16px;

    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.5px;

    text-align: center;
    text-decoration: none;
    margin-top: 10px;

    color: var(--text-dim);

    text-align: center;

    margin: 0 auto;

  .catalog-header h1 {

    font-size: 34px;
    font-weight: 300;
    letter-spacing: -0.5px;

  .catalog-header p {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 1px;

  .catalog-section-title {
    font-size: 11px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    padding: 20px 24px 12px;
    max-width: 500px;
    margin: 0 auto;
    font-weight: 500;

  .catalog-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    background: var(--border);
    max-width: 500px;
    margin: 0 auto 24px;
    border-radius: 12px;
    overflow: hidden;

  .catalog-card {
    background: var(--surface);
    padding: 16px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    color: inherit;
    display: block;

  .catalog-card .card-img {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, var(--surface-2) 0%, var(--bg) 100%);
    border-radius: 8px;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .catalog-card .card-img svg {
    width: 32px;
    height: 32px;
    color: var(--border);
  }
  .catalog-card h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    margin-bottom: 3px;
    line-height: 1.2;
  }
  .catalog-card .card-model {
    font-size: 10px;
    color: var(--text-dim);
    font-family: monospace;
    margin-bottom: 6px;
  }
  .catalog-card .card-watts {
    font-size: 11px;
    color: var(--accent);

  /* Loading / Error */
  .loading {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    gap: 16px;
  }
  .loading-spinner {
    width: 32px;
    height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--text-dim); }
  .error {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
    padding: 24px;
    gap: 12px;
  }
  .error h2 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-size: 24px; }
  .error p { font-size: 14px; color: var(--text-dim); }
  .error a { color: var(--accent); }

  /* Animations */
  .fade-up {
    opacity: 0;
    transform: translateY(15px);
    animation: fadeUp 0.5s ease forwards;
  }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
  .d1 { animation-delay: 0.05s; }
  .d2 { animation-delay: 0.1s; }
  .d3 { animation-delay: 0.15s; }
  .d4 { animation-delay: 0.2s; }
  .d5 { animation-delay: 0.25s; }
  .d6 { animation-delay: 0.3s; }
  .d7 { animation-delay: 0.35s; }

</head>

function getProductId() {
  const params = new URLSearchParams(window.location.search);
  return params.get('id');
}

function renderProduct(product, productId) {
  const app = document.getElementById('app');
  const specEntries = Object.entries(product.specs);
  const hasImages = product.images && product.images.length > 0;

  let galleryHTML;
  if (hasImages) {
    galleryHTML = `
      <div class="gallery" id="gallery">
        <a href="?catalog" class="back-btn">${ICONS.back}</a>
        <div class="gallery-track" id="galleryTrack">
          ${product.images.map(img => `<div class="gallery-slide"><img src="${img}" alt="${product.name}" loading="lazy"></div>`).join('')}
        </div>
        <div class="gallery-dots" id="galleryDots">
          ${product.images.map((_, i) => `<button class="gallery-dot ${i === 0 ? 'active' : ''}" data-index="${i}"></button>`).join('')}
        </div>
        <div class="gallery-counter"><span id="slideNum">1</span> / ${product.images.length}</div>
      </div>`;
  } else {
    galleryHTML = `
      <div class="gallery">
        <a href="?catalog" class="back-btn">${ICONS.back}</a>
        <div class="placeholder-img">
          ${ICONS.photo}
          <span>Photo coming soon</span>
        </div>
      </div>`;
  }

  let includesHTML = '';
  if (product.includes) {
    includesHTML = `
      <div class="includes-box fade-up d4">
        <h3>Kit Includes</h3>
        ${product.includes.map(item => `
          <div class="includes-item">
            <span class="includes-check">${ICONS.check}</span>
            <span>${item}</span>
          </div>
        `).join('')}
      </div>`;
  }

  let noteHTML = '';
  if (product.note) {
    noteHTML = `
      <div class="note-box fade-up d4">
        ${ICONS.info}
        <p>${product.note}</p>
      </div>`;
  }

  app.innerHTML = `
    ${galleryHTML}
    <div class="content">
      <div class="category-badge fade-up">${product.category}</div>
      <h1 class="product-name fade-up d1">${product.name}</h1>
      <div class="product-model fade-up d1">${product.model} &nbsp;|&nbsp; ID: ${productId}</div>

      <div class="tag-row fade-up d2">
        ${product.specs['IP Rating'] ? `<span class="tag highlight">${product.specs['IP Rating']}</span>` : ''}
        ${product.specs['Voltage'] || product.specs['Output'] ? `<span class="tag">${product.specs['Voltage'] || product.specs['Output']}</span>` : ''}
        ${product.specs['Wattage'] ? `<span class="tag">${product.specs['Wattage']}</span>` : ''}
        ${product.specs['CCT'] ? `<span class="tag">${product.specs['CCT']}</span>` : ''}
        ${product.specs['CRI'] ? `<span class="tag">${product.specs['CRI']}</span>` : ''}
      </div>

      <div class="divider fade-up d2"></div>
      <p class="description fade-up d3">${product.description}</p>
      ${includesHTML}
      ${noteHTML}

      <div class="specs-title fade-up d5">Full Specifications</div>
      <div class="specs-grid fade-up d5">
        ${specEntries.map(([key, val]) => `
          <div class="spec-item">
            <div class="spec-label">${key}</div>
            <div class="spec-value">${val}</div>
          </div>
        `).join('')}
      </div>

      <div class="cta-section fade-up d6">
        <a href="tel:${CONTACT.phone}" class="btn-primary">Call Showroom</a>
        <a href="tel:${CONTACT.phone}" class="btn-secondary">Contact for Quote</a>
      </div>

      <div class="showroom-badge fade-up d7">
        ${ICONS.pin}
        <span>${CONTACT.showroom}</span>
        <span class="showroom-hours">${CONTACT.hours}</span>
      </div>
    </div>
  `;

  if (hasImages && product.images.length > 1) initGallery(product.images.length);
}

function renderCatalog() {
  const app = document.getElementById('app');
  const grouped = {};

  for (const [id, p] of Object.entries(PRODUCTS)) {
    if (!grouped[p.category]) grouped[p.category] = [];
    grouped[p.category].push({ id, ...p });
  }

  let sectionsHTML = '';
  for (const cat of CATEGORY_ORDER) {
    if (!grouped[cat]) continue;
    sectionsHTML += `
      <div class="catalog-section-title">${cat}</div>
      <div class="catalog-grid">
        ${grouped[cat].map(p => `
          <a href="?id=${p.id}" class="catalog-card">
            <div class="card-img">
              ${p.images && p.images.length > 0
                ? `<img src="${p.images[0]}" alt="${p.name}" style="width:100%;height:100%;object-fit:contain;border-radius:8px;">`
                : ICONS.light
              }
            </div>
            <h3>${p.name}</h3>
            <div class="card-model">${p.model}</div>
            <div class="card-watts">${p.specs.Wattage || p.specs['Track Length'] || p.specs.Type || ''}</div>
          </a>
        `).join('')}
      </div>`;
  }

  app.innerHTML = `
    <div class="catalog-header">
      <div class="category-badge" style="margin-bottom:16px">Color Bridge Series</div>
      <h1>Outdoor Track System</h1>
      <p>Tap a product to view full details</p>
    </div>
    ${sectionsHTML}
    <div style="padding:24px;text-align:center;">
      <div class="showroom-badge">
        ${ICONS.pin}
        <span>${CONTACT.showroom}</span>
        <span class="showroom-hours">${CONTACT.hours}</span>
      </div>
    </div>
  `;
}

function renderError(id) {
  document.getElementById('app').innerHTML = `
    <div class="error">
      <h2>Product Not Found</h2>
      <p>No product with ID "${id}" was found.<br>Please ask a showroom associate for help.</p>
      <a href="?catalog">Browse full catalog &rarr;</a>
    </div>
  `;
}

function initGallery(count) {
  const track = document.getElementById('galleryTrack');
  const dots = document.querySelectorAll('.gallery-dot');
  const counter = document.getElementById('slideNum');
  const gallery = document.getElementById('gallery');
  let current = 0, startX = 0, isDragging = false;

  function goTo(i) {
    current = Math.max(0, Math.min(count - 1, i));
    track.style.transform = 'translateX(-' + (current * 100) + '%)';
    dots.forEach((d, j) => d.classList.toggle('active', j === current));
    counter.textContent = current + 1;
  }
  dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.index)));
  gallery.addEventListener('touchstart', e => { startX = e.touches[0].clientX; isDragging = true; }, { passive: true });
  gallery.addEventListener('touchend', e => {
    if (!isDragging) return;
    const diff = startX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) goTo(current + (diff > 0 ? 1 : -1));
    isDragging = false;
  }, { passive: true });
}

// ============================================================
// ROUTER
// ============================================================
const params = new URLSearchParams(window.location.search);
const productId = params.get('id');
const showCatalog = params.has('catalog') || (!productId && !params.has('id'));

setTimeout(() => {
  if (showCatalog || !productId) {
    renderCatalog();
  } else if (PRODUCTS[productId]) {
    renderProduct(PRODUCTS[productId], productId);
  } else {
    renderError(productId);
  }
}, 300);
